name: Build Flutter APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'flutter_app/**'
      - '.github/workflows/flutter-apk.yml'
  # PRs that touch the app build an artifact (no Release publish) to catch errors.
  pull_request:
    paths:
      - 'flutter_app/**'
      - '.github/workflows/flutter-apk.yml'

permissions:
  contents: write

jobs:
  build:
    name: Assemble release APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Generate Android platform files
        working-directory: flutter_app
        run: |
          cp pubspec.yaml /tmp/pubspec.yaml
          rm -rf /tmp/libbk && cp -r lib /tmp/libbk
          flutter create --platforms=android --org com.luckyludo --project-name lucky_ludo .
          cp /tmp/pubspec.yaml pubspec.yaml
          rm -rf lib && cp -r /tmp/libbk lib
          sed -i 's/android:label="[^"]*"/android:label="Lucky Ludo"/' android/app/src/main/AndroidManifest.xml || true

      - name: Build release APK
        working-directory: flutter_app
        run: |
          flutter pub get
          dart run flutter_launcher_icons
          flutter build apk --release

      - name: Stage APK
        run: cp flutter_app/build/app/outputs/flutter-apk/app-release.apk lucky-ludo.apk

      - name: Upload APK as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: lucky-ludo-apk
          path: lucky-ludo.apk

      # Delete the previous apk-latest release + tag so the recreated one below
      # gets a fresh publish timestamp (otherwise GitHub keeps showing the
      # original creation time as "latest release X ago").
      - name: Refresh release (delete old apk-latest)
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete apk-latest --yes --cleanup-tag --repo "${{ github.repository }}" || true

      - name: Publish to GitHub Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-latest
          name: Lucky Ludo APK (build ${{ github.run_number }})
          body: |
            **Lucky Ludo** — native Flutter build, fully offline.
            Build #${{ github.run_number }} · commit ${{ github.sha }}

            1. Download `lucky-ludo.apk` on your Android phone.
            2. Open it; allow installing from this source if prompted.
            3. Launch **Lucky Ludo** — play vs the computer or pass-and-play.

            Debug-signed release build.
          files: lucky-ludo.apk
          make_latest: true
