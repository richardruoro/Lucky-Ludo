name: lucky_ludo
description: Lucky Ludo — wooden-board P2P stakes game (offline).
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1

# App launcher icon (generated in CI from the provided artwork). The image is
# already a finished icon with its own wooden frame, so we use it as the legacy
# full-bleed icon rather than an adaptive foreground (which would crop the frame).
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 24

flutter:
  uses-material-design: true
